<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MyTempMail Browser Fetch Example</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
        max-width: 760px;
        margin: 40px auto;
        padding: 0 20px;
      }

      button {
        border: 2px solid #111827;
        border-radius: 8px;
        background: #facc15;
        box-shadow: 4px 4px 0 #111827;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
      }

      pre {
        background: #111827;
        border-radius: 8px;
        color: #f9fafb;
        overflow: auto;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <h1>MyTempMail Browser Fetch Example</h1>
    <p>Create a temporary inbox from a browser using the public MyTempMail API.</p>
    <button id="create">Create inbox</button>
    <pre id="output">Click "Create inbox" to start.</pre>

    <script>
      const output = document.querySelector('#output');
      const button = document.querySelector('#create');

      async function createInbox() {
        const response = await fetch('https://api.mytempmail.cc/api/address', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-fingerprint': 'docs-example-browser'
          },
          body: JSON.stringify({
            domain: 'nilvaro.com',
            expiry: 1800
          })
        });

        const body = await response.json();

        if (!response.ok) {
          throw new Error(JSON.stringify(body, null, 2));
        }

        return body;
      }

      button.addEventListener('click', async () => {
        button.disabled = true;
        output.textContent = 'Creating inbox...';

        try {
          const inbox = await createInbox();
          output.textContent = JSON.stringify(inbox, null, 2);
        } catch (error) {
          output.textContent = error.message;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
